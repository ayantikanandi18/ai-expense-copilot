<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>{% block title %}AI Expense Copilot{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="border-b border-slate-800 px-6 py-4 flex items-center gap-6">
    <a href="{{ url_for('dashboard.index') }}" class="font-semibold text-emerald-400">AI Expense Copilot</a>
    <a href="{{ url_for('dashboard.index') }}" class="text-slate-300 hover:text-white text-sm">Dashboard</a>
    <a href="{{ url_for('documents.list_documents') }}" class="text-slate-300 hover:text-white text-sm">Documents</a>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-8">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-6 space-y-2">
          {% for category, message in messages %}
            <div class="rounded px-4 py-2 text-sm {{ 'bg-red-900/40 text-red-200 border border-red-800' if category == 'error' else 'bg-emerald-900/40 text-emerald-200 border border-emerald-800' }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
